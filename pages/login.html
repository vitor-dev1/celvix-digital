<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Access — Celvix Partners</title>
  <meta name="description" content="Sign in to your private Celvix Partners dashboard — the members area for partnered real estate agents." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/members.css" />
</head>
<body>
  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <!-- Aurora gold glow + grid background -->
  <div class="aurora-bg" aria-hidden="true"></div>

  <main class="login-wrap">
    <div class="login-card reveal">
      <div class="login-brand">CELVIX<span class="dot">•</span>PARTNERS</div>

      <div class="login-head">
        <h1>Member Access</h1>
        <p>Sign in to your private Celvix Partners dashboard.</p>
      </div>

      <form id="login-form" novalidate>
        <div class="login-error" role="alert">Invalid credentials. Please try again.</div>

        <div class="login-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" autocomplete="username" placeholder="you@email.com" required />
        </div>

        <div class="login-field">
          <label for="login-password">Password</label>
          <div class="login-input-wrap">
            <input type="password" id="login-password" name="password" autocomplete="current-password" placeholder="••••••••" required />
            <button type="button" class="pw-toggle" aria-label="Show password">
              <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22"/><path d="M9.88 9.88a3 3 0 104.24 4.24"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary login-submit">
          <span class="label">Sign In</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          <span class="spinner" aria-hidden="true"></span>
        </button>

        <div class="login-trust">
          <span class="lock">&#128274;</span>
          <span>Payments are managed via Whop.</span>
        </div>
      </form>

      <a href="../index.html" class="login-back">&larr; Back to site</a>
    </div>
  </main>

  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
